version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: guardianship-postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: guardianship_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - guardianship-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: guardianship-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - guardianship-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  api-gateway:
    build:
      context: ./backend/api-gateway
      dockerfile: Dockerfile
    container_name: guardianship-api
    environment:
      DB_HOST: postgres
      DB_USER: postgres
      DB_PASSWORD: postgres
      DB_NAME: guardianship_db
      REDIS_URL: redis://redis:6379
      JWT_SECRET: dev-secret-key-change-in-production
      APP_ENV: development
      DEBUG: "true"
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - guardianship-network
    volumes:
      - ./backend/api-gateway/src:/app/src
    command: python -m uvicorn src.main:app --host 0.0.0.0 --port 8000 --reload

  frontend:
    build:
      context: ./frontend/guardian-dashboard
      dockerfile: Dockerfile
    container_name: guardianship-frontend
    ports:
      - "3000:3000"
    environment:
      REACT_APP_API_URL: http://localhost:8000
      REACT_APP_ENV: development
    depends_on:
      - api-gateway
    networks:
      - guardianship-network
    volumes:
      - ./frontend/guardian-dashboard/src:/app/src
    command: npm start

volumes:
  postgres_data:
  redis_data:

networks:
  guardianship-network:
    driver: bridge
